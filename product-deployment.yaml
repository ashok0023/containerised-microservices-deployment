apiVersion: apps/v1
kind: Deployment

metadata:
  name: product-service-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: product-service

  template:
    metadata:
      labels:
        app: product-service

    spec:
      containers:
      - name: product-service
        image: ashok59977/product-service:v1

        ports:
        - containerPort: 5002