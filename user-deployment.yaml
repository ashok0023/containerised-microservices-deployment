apiVersion: apps/v1
kind: Deployment

metadata:
  name: user-service-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: user-service

  template:
    metadata:
      labels:
        app: user-service

    spec:
      containers:
      - name: user-service
        image: ashok59977/user-service:v1

        ports:
        - containerPort: 5001